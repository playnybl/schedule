<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Schedule</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body { font-family: Arial; margin: 10px; }
    #calendar { max-width: 1000px; margin: auto; }
  </style>
</head>

<body>

<h2>Youth Basketball League Schedule</h2>
<div id="calendar"></div>

<script>
async function loadGames() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSChfiQxZOhr7xaATdHQBvTRR5NaDaPchOrzsI1ZYaZaQ53btTrNo9_oz-DANltZplfzyQKNW1KnEkC/pub?output=csv";

  const response = await fetch(url);
  const text = await response.text();

  const lines = text.trim().split("\n");

  const events = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");

    if (cols.length < 4) continue;

    const title = cols[0];
    const date = cols[1];
    const time = cols[2];
    const location = cols[3];

    if (!title || !date || !time) continue;

    events.push({
      title: title + " @ " + location,
      start: date + "T" + time
    });
  }

  return events;
}

document.addEventListener('DOMContentLoaded', async function() {

  try {
    const events = await loadGames();

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      height: "auto",
      events: events
    });

    calendar.render();

  } catch (err) {
    document.body.innerHTML += "<p style='color:red;'>Error loading schedule. Check your Google Sheets link.</p>";
    console.error(err);
  }

});
</script>

</body>
</html>
