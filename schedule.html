<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Youth Basketball Schedule</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body { font-family: Arial; margin: 10px; }
    #calendar { max-width: 1000px; margin: auto; }
  </style>
</head>

<body>

<h2>Youth Basketball League Schedule</h2>
<div id="calendar"></div>

<script>
async function loadGames() {
  const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSChfiQxZOhr7xaATdHQBvTRR5NaDaPchOrzsI1ZYaZaQ53btTrNo9_oz-DANltZplfzyQKNW1KnEkC/pub?output=csv");
  const data = await response.text();

  const rows = data.split("\n").slice(1);

  return rows.map(row => {
    const [title, date, time, location] = row.split(",");
    if (!title) return null;

    return {
      title: title + " @ " + location,
      start: date + "T" + time
    };
  }).filter(e => e);
}

document.addEventListener('DOMContentLoaded', async function() {
  const events = await loadGames();

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    height: "auto",
    events: events
  });

  calendar.render();
});
</script>

</body>
</html>
