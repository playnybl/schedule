<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Schedule</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body { font-family: Arial; margin: 10px; }
    #calendar { max-width: 1000px; margin: auto; }
    #error { color: red; }
  </style>
</head>

<body>

<h2>Youth Basketball League Schedule</h2>
<div id="calendar"></div>
<div id="error"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  try {

    const events = [

      { title: "Cavs vs Panthers @ St John Neumann", start: "2026-06-10T18:00" },
      { title: "Sharks vs Knicks @ St John Neumann", start: "2026-06-10T18:00" },
      { title: "Celtics vs QS @ St John Neumann", start: "2026-06-10T18:45" },

      { title: "Cavs vs Sharks @ St John Neumann", start: "2026-06-17T18:00" },
      { title: "Panthers vs Knicks @ St John Neumann", start: "2026-06-17T18:00" },

      { title: "Cavs vs Knicks @ St John Neumann", start: "2026-06-24T18:00" },
      { title: "Panthers vs Sharks @ St John Neumann", start: "2026-06-24T18:00" },

      { title: "Cavs vs Celtics @ St John Neumann", start: "2026-07-01T18:00" },
      { title: "Panthers vs QS @ St John Neumann", start: "2026-07-01T18:00" },

      { title: "Cavs vs 2033 G @ St John Neumann", start: "2026-07-08T18:00" },
      { title: "Panthers vs 2032 @ St John Neumann", start: "2026-07-08T18:00" }

    ];

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      height: "auto",
      events: events
    });

    calendar.render();

  } catch (err) {
    document.getElementById("error").innerText =
      "Calendar failed to load. Check console for errors.";
    console.error(err);
  }

});
</script>

</body>
</html>
