<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Schedule</title>

  <style>
    body { font-family: Arial; margin: 10px; }
    #calendar { max-width: 1000px; margin: auto; }
  </style>

  <!-- Load FullCalendar (IMPORTANT: use stable CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body>

<h2>Youth Basketball League Schedule</h2>
<div id="calendar"></div>

<script>
window.onload = function () {

  const calendarEl = document.getElementById('calendar');

  if (!window.FullCalendar) {
    document.body.innerHTML += "<p style='color:red;'>FullCalendar failed to load</p>";
    return;
  }

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: "auto",
    events: [
      { title: "Cavs vs Panthers", date: "2026-06-10" },
      { title: "Sharks vs Knicks", date: "2026-06-10" },
      { title: "Celtics vs QS", date: "2026-06-10" }
    ]
  });

  calendar.render();
};
</script>

</body>
</html>
